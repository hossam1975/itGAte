name: CI/CD Build and Push

on:
  push:
    branches: [ main ] # يشتغل أول ما تعمل push للمين

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 1. تسجيل الدخول لـ DockerHub باستخدام الـ Secrets اللي ضفناها
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 2. بناء الـ Image بتاعة الـ Backend ورفعها
      - name: Build and Push Backend
        run: |
          # بنستخدم رقم الـ Commit كـ Tag عشان كل نسخة تبقى فريدة
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/itgate-backend:${{ github.sha }} ./backend/mood
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/itgate-backend:${{ github.sha }}

      # 3. السحر! تغيير الـ Tag جوه ملف الـ values.yaml أوتوماتيك
      - name: Update Helm Tag in values.yaml
        run: |
          sed -i "s/tag: .*/tag: ${{ github.sha }}/g" charts/my-app/values.yaml
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add charts/my-app/values.yaml
          git commit -m "chore: update image tag to ${{ github.sha }}"
          git push
