# Azure DevOps pipeline: build images, push to Docker Hub, then deploy to EC2 (Docker Compose) or K8s.
# Agent pool: Default. Image registry: Docker Hub.
# Set pipeline variables and service connections (see docs/azure-pipelines-setup.md).

parameters:
  - name: deployTarget
    displayName: 'Deployment target'
    type: string
    default: 'ec2-docker-compose'
    values:
      - ec2-docker-compose
      - k8s

  - name: imageTag
    displayName: 'Docker image tag (default: build ID)'
    type: string
    default: ''

variables:
  - group: ITGATE
  - name: DOCKERHUB_IMAGE_PREFIX
    value: '$(DOCKERHUB_USERNAME)/ashour-chat'
  - name: TAG
    value: $[ coalesce(variables['Build.SourceVersion'], variables['Build.BuildId']) ]

trigger:
  branches:
    include:
      - main
      - master
  paths:
    exclude:
      - '*.md'
      - 'docs/*'

pool: Default

stages:
  - stage: Build
    displayName: 'Build and push to Docker Hub'
    jobs:
      - job: BuildImages
        displayName: 'Build and push Docker images'
        steps:
          - script: |
              if [ -z "${{ parameters.imageTag }}" ]; then
                echo "##vso[task.setvariable variable=effectiveTag;isOutput=true]$(Build.BuildId)"
              else
                echo "##vso[task.setvariable variable=effectiveTag;isOutput=true]${{ parameters.imageTag }}"
              fi
            displayName: 'Set effectiveTag (param or Build.BuildId)'
            name: setEffectiveTag

          - task: Docker@2
            displayName: 'Login to Docker Hub'
            inputs:
              command: login
              containerRegistry: 'dockerHubConnection'

          - task: Docker@2
            displayName: 'Build and push frontend'
            inputs:
              command: buildAndPush
              containerRegistry: 'dockerHubConnection'
              repository: '$(DOCKERHUB_IMAGE_PREFIX)-frontend'
              Dockerfile: 'frontend/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                $(effectiveTag)
                latest

          - task: Docker@2
            displayName: 'Build and push reactions'
            inputs:
              command: buildAndPush
              containerRegistry: 'dockerHubConnection'
              repository: '$(DOCKERHUB_IMAGE_PREFIX)-reactions'
              Dockerfile: 'backend/reactions/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                $(effectiveTag)
                latest

          - task: Docker@2
            displayName: 'Build and push mood'
            inputs:
              command: buildAndPush
              containerRegistry: 'dockerHubConnection'
              repository: '$(DOCKERHUB_IMAGE_PREFIX)-mood'
              Dockerfile: 'backend/mood/Dockerfile'
              buildContext: '$(Build.SourcesDirectory)'
              tags: |
                $(effectiveTag)
                latest

          - task: PublishPipelineArtifact@1
            displayName: 'Publish image tag for deploy'
            inputs:
              targetPath: '$(Build.SourcesDirectory)'
              artifact: 'image-tag'
              publishLocation: 'pipeline'
            condition: succeeded()

  - stage: DeployEC2
    displayName: 'Deploy to EC2 (Docker Compose)'
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.deployTarget }}', 'ec2-docker-compose'))
    variables:
      effectiveTag: $[ stageDependencies.Build.BuildImages.outputs['setEffectiveTag.effectiveTag'] ]
    jobs:
      - deployment: DeployToEC2
        displayName: 'Deploy on EC2 with Docker Compose'
        environment: 'ec2'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: CopyFilesOverSSH@0
                  displayName: 'Copy docker-compose and env to EC2'
                  inputs:
                    sshEndpoint: 'EC2-SSH'
                    sourceFolder: '$(Build.SourcesDirectory)'
                    contents: |
                      docker-compose.yml
                      docker-compose.prod.yml
                    targetFolder: '$(EC2_DEPLOY_PATH)'
                    cleanTargetFolder: false

                - task: SSH@0
                  displayName: 'Run Docker Compose on EC2'
                  inputs:
                    sshEndpoint: 'EC2-SSH'
                    runOptions: 'inline'
                    inlineScript: |
                      set -e
                      cd $(EC2_DEPLOY_PATH)
                      export TAG=$(effectiveTag)
                      export DOCKERHUB_IMAGE_PREFIX=$(DOCKERHUB_IMAGE_PREFIX)
                      docker compose -f docker-compose.yml -f docker-compose.prod.yml pull
                      docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d

  - stage: DeployK8s
    displayName: 'Deploy to Kubernetes'
    dependsOn: Build
    condition: and(succeeded(), eq('${{ parameters.deployTarget }}', 'k8s'))
    variables:
      effectiveTag: $[ stageDependencies.Build.BuildImages.outputs['setEffectiveTag.effectiveTag'] ]
    jobs:
      - deployment: DeployToK8s
        displayName: 'Deploy to K8s cluster'
        environment: 'k8s'
        strategy:
          runOnce:
            deploy:
              steps:
                - task: DownloadPipelineArtifact@2
                  displayName: 'Get repo for manifest replacement'
                  inputs:
                    buildType: 'current'
                    artifactName: 'image-tag'
                    targetPath: '$(Pipeline.Workspace)'

                - bash: |
                    set -e
                    IMG_PREFIX="$(DOCKERHUB_IMAGE_PREFIX)"
                    TAG="$(effectiveTag)"
                    echo "Using images: ${IMG_PREFIX}-frontend:${TAG}, ${IMG_PREFIX}-reactions:${TAG}, ${IMG_PREFIX}-mood:${TAG}"
                    find k8s -name "*.yaml" -type f | while read f; do
                      sed -i.bak \
                        -e "s|image: frontend:latest|image: ${IMG_PREFIX}-frontend:${TAG}|g" \
                        -e "s|image: reactions:latest|image: ${IMG_PREFIX}-reactions:${TAG}|g" \
                        -e "s|image: mood:latest|image: ${IMG_PREFIX}-mood:${TAG}|g" \
                        "$f" && rm -f "${f}.bak"
                    done
                  displayName: 'Replace image tags in K8s manifests'

                - task: Kubernetes@1
                  displayName: 'Apply K8s namespace-3-data'
                  inputs:
                    connectionType: 'Kubernetes Service Connection'
                    kubernetesServiceConnection: 'orbstack-k8s'
                    command: 'apply'
                    arguments: '-f $(Build.SourcesDirectory)/k8s/namespace-3-data'
                - task: Kubernetes@1
                  displayName: 'Apply K8s namespace-2-backend'
                  inputs:
                    connectionType: 'Kubernetes Service Connection'
                    kubernetesServiceConnection: 'orbstack-k8s'
                    command: 'apply'
                    arguments: '-f $(Build.SourcesDirectory)/k8s/namespace-2-backend'
                - task: Kubernetes@1
                  displayName: 'Apply K8s namespace-1-frontend'
                  inputs:
                    connectionType: 'Kubernetes Service Connection'
                    kubernetesServiceConnection: 'orbstack-k8s'
                    command: 'apply'
                    arguments: '-f $(Build.SourcesDirectory)/k8s/namespace-1-frontend'
